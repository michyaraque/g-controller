name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: linux/amd64
            os: ubuntu-latest
            name: g-controller-linux
          - platform: windows/amd64
            os: windows-latest
            name: g-controller-win
          - platform: darwin/universal
            os: macos-latest
            name: g-controller-mac

    runs-on: ${{ matrix.build.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: go.sum

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          DISTRO=$(lsb_release -rs)
          if [[ "$DISTRO" == "24.04" ]]; then
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
          else
            sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev
          fi

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          DISTRO=$(lsb_release -rs)
          if [[ "$DISTRO" == "24.04" ]]; then
            wails build -platform ${{ matrix.build.platform }} -clean -o ${{ matrix.build.name }} -tags webkit2_41
          else
            wails build -platform ${{ matrix.build.platform }} -clean -o ${{ matrix.build.name }}
          fi

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: wails build -platform ${{ matrix.build.platform }} -clean -o ${{ matrix.build.name }}.exe

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: wails build -platform ${{ matrix.build.platform }} -clean

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          APP=$(find build/bin -name "*.app" -maxdepth 1 | head -1)
          ditto -c -k --keepParent "$APP" build/bin/g-controller-mac.app.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}.exe
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}.app.zip
          if-no-files-found: error

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create extension.zip
        run: |
          mkdir dist
          cp artifacts/g-controller-win/g-controller-win.exe dist/
          cp artifacts/g-controller-linux/g-controller-linux dist/
          cp artifacts/g-controller-mac/g-controller-mac.app.zip dist/
          cd dist
          zip -r ../extension.zip .

      - name: Upload extension.zip
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download extension.zip
        uses: actions/download-artifact@v4
        with:
          name: extension

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
          generate_release_notes: true
