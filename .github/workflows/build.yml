name: Build

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        build:
          - platform: linux/amd64
            os: ubuntu-latest
            name: g-controller-linux
          - platform: windows/amd64
            os: windows-latest
            name: g-controller-win
          - platform: darwin/universal
            os: macos-latest
            name: g-controller-mac

    runs-on: ${{ matrix.build.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        uses: dAppServer/wails-build-action@v2.2
        with:
          build-name: ${{ matrix.build.name }}
          build-platform: ${{ matrix.build.platform }}
          package: false
          sign: false
          go-version: '1.22'

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}.exe
          if-no-files-found: error

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}
          if-no-files-found: error

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.name }}
          path: build/bin/${{ matrix.build.name }}.app.zip
          if-no-files-found: error

  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create extension.zip
        run: |
          mkdir dist
          cp artifacts/g-controller-win/g-controller-win.exe dist/
          cp artifacts/g-controller-linux/g-controller-linux dist/
          cp artifacts/g-controller-mac/g-controller-mac.app.zip dist/g-controller-mac.app.zip
          cd dist
          zip -r ../extension.zip .

      - name: Upload extension.zip
        uses: actions/upload-artifact@v4
        with:
          name: extension
          path: extension.zip
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download extension.zip
        uses: actions/download-artifact@v4
        with:
          name: extension

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: extension.zip
          generate_release_notes: true
